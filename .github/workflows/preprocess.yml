name: Automatic Preprocessing Pipeline

on:
  push:
    branches:
      - main
  workflow_dispatch:

jobs:
  preprocess:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout repository code
      uses: actions/checkout@v3

    - name: Set up Python 3.9
      uses: actions/setup-python@v4
      with:
        python-version: '3.9'

    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        pip install pandas numpy scikit-learn

    - name: Run Preprocessing Automation
      run: |
        cd preprocessing
        python automate_Ersa.py ../wine_quality_raw.csv ./namadataset_preprocessing/wine_preprocessed.csv

    - name: Commit and Push Preprocessed Data
      run: |
        git config --global user.name "github-actions[bot]"
        git config --global user.email "41898282+github-actions[bot]@users.noreply.github.com"
        git add preprocessing/namadataset_preprocessing/wine_preprocessed.csv
        git diff-index --quiet HEAD || git commit -m "chore: auto-update preprocessed dataset [skip ci]"
        git push
